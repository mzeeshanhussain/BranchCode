<!DOCTYPE html>
<html>
<head>
  <title>Journey CLS Fix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Branch SDK -->
  <script>
    (function(b,r,a,n,c,h,_,s,d,k){
      if(!b[n]||!b[n]._q){
        for(;s<_.length;)c(h,_[s++]);
        d=r.createElement(a);d.async=1;d.src="https://cdn.branch.io/branch-latest.min.js";
        k=r.getElementsByTagName(a)[0];k.parentNode.insertBefore(d,k);
        b[n]=h
      }
    })(window,document,"script","branch",function(b,r){
      b[r]=function(){b._q.push([r,arguments])}
    },{_q:[],_v:1},["init","addListener"],0);
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Pre-reserve the banner height before first paint to eliminate CLS.
       The space is always held on initial load; we only collapse it if
       the Journey will NOT show (didNotShowJourney). */
    .journey-rail {
      height: 77px; /* 76px content + 1px border-top from .branch-banner-content */
      overflow: hidden;
      background: #fff;
      /* No transition on initial render — transition only after SDK resolves */
    }

    .header {
      height: 60px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    .menu {
      height: 50px;
      background: #555;
      color: white;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    .content {
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- Journey container -->
  <div class="journey-rail">
    <div class="branch-journeys-top"></div>
  </div>

  <div class="header">My Company v2.0.1</div>

  <div class="menu">Home | Products | Contact</div>

  <div class="content">
    <h1>Homepage</h1>
    <p>Content...</p>
    <p>More content...</p>
    <p>More content...</p>
  </div>

  <script>
    branch.init('key_live_bqqwh41FYDtxSbZsQktKOlaoACfJkl3D');

    const rail = document.querySelector('.journey-rail');

    branch.addListener(function(event, data) {
      console.log('Listener event', { event: event, data: data || {} });
    });

    // Space is pre-reserved in CSS — nothing to do when Journey shows.
    // willShowJourney: no layout change needed, CLS = 0
    branch.addListener('willShowJourney', function() {
      // Space was already reserved, no shift occurs
    });

    // Collapse the reserved space if Journey will NOT show.
    // Add transition here (after initial paint) so collapse is smooth
    // but doesn't count against CLS since no content shifted on load.
    branch.addListener('didNotShowJourney', function() {
      rail.style.transition = 'height 0.2s ease';
      rail.style.height = '0px';
    });
  </script>

</body>
</html>
