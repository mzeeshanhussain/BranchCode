      transition: height 0.2s ease;
      background: #f5f5f5;

    .header {

      background: #333;
      color: white;
      display: flex;

  <div id="journey-slot" class="journey-slot"></div>

  <!-- 2. Company -->
  <div class="header">My Company</div>

  <!-- 3. Menu -->
  <div class="menu">Home | Products | Contact</div>

  <!-- 4. Content -->

    <p>Scroll down to see more content.</p>
    <p>Lorem ipsum dolor sit amet...</p>
    <p>More content...</p>
    <p>More content...</p>
  </div>

  <script>
    branch.init('key_live_bqqwh41FYDtxSbZsQktKOlaoACfJkl3D');

    const slot = document.getElementById('journey-slot');

    branch.addListener('willShowJourney', function() {

    branch.addListener('didNotShowJourney', function() {
