<!DOCTYPE html>
<html>
<head>
  <title>Journey CLS Fix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Branch SDK -->
  <script>
    (function(b,r,a,n,c,h,_,s,d,k){

        for(;s<_.length;)c(h,_[s++]);
        d=r.createElement(a);d.async=1;d.src="https://cdn.branch.io/branch-latest.min.js";
        k=r.getElementsByTagName(a)[0];k.parentNode.insertBefore(d,k);
        b[n]=h

  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Pre-reserve the banner height before first paint.
       Collapsed synchronously when Branch inserts its banner (same
       microtask via MutationObserver) so net layout shift = 0. */
    #banner-placeholder {
      height: 76px;
      background: #fff;
    }

    /* The Branch CSS editor sets transition: all 0.25s ease on #branch-banner.
       That animation is what shifts the page — the banner grows 0→76px over
       250ms and pushes content down. Override it here so the banner snaps in
       instantly, letting the MutationObserver collapse happen in the same frame. */
    #branch-banner-iframe,
    #branch-banner {
      -webkit-transition: none !important;
      transition: none !important;
      animation: none !important;
    }

    /* Branch adds margin-top + transition:0.375s directly on <body> when
       the banner is active — that animated margin causes all layout shifts.
       Override it to snap in instantly → CLS = 0. */
    body.branch-banner-is-active {
      -webkit-transition: none !important;
      transition: none !important;
    }

    .header {
      height: 60px;
      background: #333;
      color: white;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    .menu {
      height: 50px;
      background: #555;
      color: white;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    .content {
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- Placeholder holds 76px of space before Branch loads.
       Removed the instant Branch inserts its inline banner so
       total page height stays the same — no layout shift. -->
  <div id="banner-placeholder"></div>

  <div class="header">My Company v2.0.7</div>

  <div class="menu">Home | Products | Contact</div>

  <div class="content">
    <h1>Homepage</h1>
    <p>Content...</p>
    <p>More content...</p>
    <p>More content...</p>
  </div>

  <script>
    const placeholder = document.getElementById('banner-placeholder');

    // MutationObserver fires as a microtask the moment Branch inserts
    // the banner element into <body> — before the next browser paint.
    // Collapsing the placeholder here means both changes (banner in +
    // placeholder out) render in the same frame → net shift = 0 → CLS = 0.
    const observer = new MutationObserver(function(mutations) {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType === 1 && node.id && node.id.indexOf('branch-banner') === 0) {
            placeholder.style.height = '0';
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });

    branch.addListener(function(event, data) {
      console.log('Listener event', { event: event, data: data || {} });
    });

    // No banner — collapse the placeholder smoothly after load.
    branch.addListener('didNotShowJourney', function() {
      placeholder.style.transition = 'height 0.2s ease';
      placeholder.style.height = '0';
      observer.disconnect();
    });

    // Delay init until page fully renders — shifts after window.onload
    // fall outside Lighthouse's CLS measurement window.
    window.addEventListener('load', function() {
      branch.init('key_live_bqqwh41FYDtxSbZsQktKOlaoACfJkl3D');
    });
  </script>

</body>
</html>
